<app-navbar></app-navbar>

<style>
  .grad {
    background-image: linear-gradient(to bottom right, rgb(32, 168, 168), rgb(219, 231, 237));
    background-repeat: no-repeat;
    background-size: 100%;
    padding-bottom: 25px;
  }
</style>

<div class="row" style="padding-top:7%; padding-bottom:3%;
background:url(assets/files/wall.jpg) no-repeat center center;
background-attachment: fixed;
background-size: cover;width:auto;height:auto;">

  <div class="col-sm-4"></div>

  <div class="col-sm-4">
    <div class="card">
      <div class="card-body shadow-lg grad">
        <form>

          <h2 align="center" *ngIf="!form.data.id" class="text-primary font-weight-bold">Add Marksheet</h2>
          <h2 align="center" *ngIf="form.data.id>0" class="text-primary font-weight-bold">Update Marksheet</h2>

          <div *ngIf="!form.error && form.message != null" class="alert alert-success alert-dismissible">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{form.message}}
          </div>

          <div *ngIf="form.error && form.message != null" class="alert alert-danger alert-dismissible">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{form.message}}
          </div>

          <!-- Roll No -->
          <div style="padding-top:3%">
            <span><b>Roll No</b></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-id-card"></i></div>
                </div>
                <input type="text" name="rollNo" [(ngModel)]="form.data.rollNo" class="form-control"
                  placeholder="Enter Roll No">
              </div>
            </div>
            <span class="alertRedColor">{{form.inputerror.rollNo}}</span>
          </div>

          <!-- Student -->
          <div style="padding-top:3%">
            <span><b>Student</b></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-user"></i></div>
                </div>
                <select class="form-control" required name="studentId" [(ngModel)]="form.data.studentId"
                  style="cursor:pointer;">
                  <option value="undefined">Select Student</option>
                  <option *ngFor="let obj of form.preload.studentList" [value]="obj.id">{{obj.firstName + ' ' +
                    obj.lastName}}</option>
                </select>
              </div>
            </div>
            <span class="alertRedColor">{{form.inputerror.studentId}}</span>
          </div>

          <!-- Physics -->
          <div style="padding-top:3%">
            <span><b>Physics</b></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-check"></i></div>
                </div>
                <input type="text" name="phy" [(ngModel)]="form.data.physics" class="form-control"
                  placeholder="Enter Physics Marks">
              </div>
            </div>
            <span class="alertRedColor">{{form.inputerror.physics}}</span>
          </div>

          <!-- Chemistry -->
          <div style="padding-top:3%">
            <span><b>Chemistry</b></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-check"></i></div>
                </div>
                <input type="text" name="chemistry" [(ngModel)]="form.data.chemistry" class="form-control"
                  placeholder="Enter Chemistry Marks">
              </div>
            </div>
            <span class="alertRedColor">{{form.inputerror.chemistry}}</span>
          </div>

          <!-- Maths -->
          <div style="padding-top:3%">
            <span><b>Maths</b></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-check"></i></div>
                </div>
                <input type="text" name="math" [(ngModel)]="form.data.maths" class="form-control"
                  placeholder="Enter Maths Marks">
              </div>
            </div>
            <span class="alertRedColor">{{form.inputerror.maths}}</span>
          </div>

          <!-- Buttons -->
          <div class="row pt-3 pl-3 pb-3 justify-content-center">
            <div class="col-auto">
              <button *ngIf="!form.data.id" (click)="submit()" class="btn btn-success mr-2">Save</button>&nbsp;
              <button *ngIf="form.data.id>0" (click)="submit()" class="btn btn-success mr-2">Update</button>
              <button (click)="forward('/marksheetList')" type="button" class="btn btn-warning">List</button>&nbsp;
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
