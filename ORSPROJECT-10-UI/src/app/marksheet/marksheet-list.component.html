<br><br><br>
<div class="content-wrapper" style="padding-top: 3%;padding-bottom: 8%; 
background: url(assets/files/teahub.png) no-repeat center center;
background-attachment: fixed;
background-size: cover;width:auto;
height: 90vh;">
  <div class="container-fluid">

    <!-- Alert Messages -->
    <div *ngIf="form.message && form.error === true" class="alert alert-danger alert-dismissible text-center mx-auto"
      style="max-width: 600px; width: 80%; margin-bottom: 15px;">
      <button type="button" class="close" data-dismiss="alert">&times;</button>
      {{form.message}}
    </div>

    <div *ngIf="form.message && form.error === false" class="alert alert-success alert-dismissible text-center mx-auto"
      style="max-width: 600px; width: 80%; margin-bottom: 15px;">
      <button type="button" class="close" data-dismiss="alert">&times;</button>
      {{form.message}}
    </div>

    <div class="panel panel-primary" *ngIf="form.list.length > 0">
      <div class="panel-heading" style="height: 50px;">
        <div class="text-center">
          <h1 class="text-white font-weight-bold">Marksheet List</h1>
        </div>
      </div>

      <div class="row pt-4 pb-4" style="margin-left:15%">
        <div class="col-sm-3">
          <input type="text" class="form-control" [(ngModel)]="form.searchParams.name" placeholder="Search Name">
        </div>


        <div class="col-sm-3">
          <select class="form-control" [(ngModel)]="form.searchParams.rollNo">

            <option [ngValue]="undefined">Select RollNo</option>

            <option *ngFor="let obj of form.preload.marksheetList" [value]="obj.key">
              {{obj.value}}
            </option>

          </select>
        </div>

        <div class="col-sm-4 d-flex justify-content-end flex-wrap gap-2">
          <button (click)="search()" class="btn btn-primary">Search</button>&nbsp;&nbsp;&nbsp;
          <button (click)="reset()" class="btn btn-secondary">Reset</button>&nbsp;&nbsp;&nbsp;
          <button (click)="forward('/marksheet')" class="btn btn-success">Add Marksheet</button>
        </div>

      </div>



      <div class="p-1">
        <div class="table-responsive" *ngIf="form.list.length > 0">
          <table class="table table-bordered table-striped table-hover font-weight-bold text-white">
            <thead class="thead-light text-uppercase">
              <tr>
                <th><input type="checkbox" [(ngModel)]="isMasterSel" name="list_name" value="h1"
                    (change)="checkUncheckAll($event)" /></th>
                <th>S.No</th>
                <th>RollNO</th>
                <th>Name</th>
                <th>Physics</th>
                <th>Chemistry</th>
                <th>Maths</th>
                <th>Edit</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let m of form.list; let i = index">
                <td> <input type="checkbox" #checkboxes (change)="checklistUpdate()" name="list_name" id="{{m.id}}"
                    value="{{isMasterSel}}" />
                </td>
                <td> {{(form.pageNo*5)+i+ 1}} </td>
                <td> {{ m.rollNo }} </td>
                <td> {{ m.name }} </td>
                <td> {{ m.physics }} </td>
                <td> {{ m.chemistry }} </td>
                <td> {{ m.maths }} </td>
                <td>
                  <a (click)="forward('/marksheet/' + m.id)" style="cursor: pointer;">
                    <i class="fa fa-edit text-info"></i>
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination + Delete Row -->
        <div class="row mt-2 align-items-center" *ngIf="form.list.length > 0">

          <!-- Previous Left -->
          <div class="col text-left">
            <button (click)="previous()" [disabled]="form.pageNo == 0" class="btn btn-info">
              Previous
            </button>
          </div>

          <!-- Back Button (Only when list empty) -->
          <div class="col text-center">
            <button *ngIf="form.list.length == 0" (click)="forward('/marksheetList')" class="btn btn-warning">
              Back
            </button>
          </div>

          <!-- Delete Center -->
          <div class="col-10 text-center">
            <button (click)="deleteMany()" class="btn btn-danger">
              Delete
            </button>
          </div>

          <!-- Next Right -->
          <div class="col text-right">
            <button (click)="next()" [disabled]="form.nextListSize == 0" class="btn btn-info">
              Next
            </button>
          </div>
        </div>

         <div class="col text-center">
      <button *ngIf="form.list.length == 0" (click)="reset()" class="btn btn-warning">
        Back
      </button>
    </div>

      </div>
    </div>
  </div>
  
   
  <br><br><br>
