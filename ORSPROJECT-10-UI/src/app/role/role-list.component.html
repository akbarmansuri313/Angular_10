<div class="content-wrapper"
  style="padding-top: 7%; background: url(assets/files/wall.jpg) no-repeat center center; background-size: cover; width:auto; min-height:100vh;">


  <!-- Alert Messages -->
  <div *ngIf="form.message && form.error === true" class="alert alert-danger alert-dismissible text-center mx-auto"
    style="max-width: 600px; width: 80%; margin-bottom: 15px;">
    <button type="button" class="close" data-dismiss="alert">&times;</button>
    {{form.message}}
  </div>

  <div *ngIf="form.message && form.error === false" class="alert alert-success alert-dismissible text-center mx-auto"
    style="max-width: 600px; width: 80%; margin-bottom: 15px;">
    <button type="button" class="close" data-dismiss="alert">&times;</button>
    {{form.message}}
  </div>
  
  <div class="panel panel-primary" *ngIf="form.list.length > 0">

    <!-- Panel Heading -->
    <div class="panel-heading text-center" style="height:50px;">
      <h1 class="text-primary font-weight-bold">Role List</h1>
    </div>

    <!-- Search Row -->
    <div class="row align-items-center mb-3">

      <div class="col-sm-3 mb-2">
        <input type="text" class="form-control" [(ngModel)]="form.searchParams.name" placeholder="Search Name">
      </div>



      <div class="col-sm-3 mb-2">
        <input type="text" class="form-control" [(ngModel)]="form.searchParams.description"
          placeholder="Search Description">
      </div>


      <div class="col-sm-3 d-flex justify-content-end flex-wrap gap-2">
        <button (click)="search()" class="btn btn-primary">Search</button>&nbsp;&nbsp;&nbsp;
        <button (click)="reset()" class="btn btn-secondary">Reset</button>&nbsp;&nbsp;&nbsp;
        <button (click)="forward('/role')" class="btn btn-success">Add Role</button>
      </div>

    </div>



    <!-- Role Table -->
    <div class="table-responsive" *ngIf="form.list.length > 0">
      <table class="table table-bordered table-dark table-hover font-weight-bold">

        <thead class="thead-dark text-uppercase" align="center">
          <tr>
            <th><input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)" /></th>
            <th>S.No</th>
            <th>Name</th>
            <th>Description</th>
            <th>Edit</th>
          </tr>
        </thead>

        <tbody align="center">
          <tr *ngFor="let m of form.list; let i = index">

            <td>
              <input type="checkbox" #checkboxes (change)="checklistUpdate()" [id]="m.id"
                [disabled]="m.roleName=='Admin'" [value]="isMasterSel" />
            </td>
            <td>{{(form.pageNo*5)+i+1}}</td>

            <td>{{m.name}}</td>

            <td>{{m.description}}</td>

            <td>
              <button class="fa fa-edit text-primary" (click)="forward('/role/' + m.id)"
                style="cursor:pointer; border:none; background:none;">
              </button>
            </td>

          </tr>
        </tbody>

      </table>
    </div>

    <div class="row mt-2 align-items-center" *ngIf="form.list.length > 0">

      <!-- Previous Left -->
      <div class="col text-left">
        <button (click)="previous()" [disabled]="form.pageNo == 0" class="btn btn-info">
          Previous
        </button>
      </div>

      <!-- Back Button (Only when list empty) -->
      <div class="col text-center">
        <button *ngIf="form.list.length == 0" (click)="forward('/roleList')" class="btn btn-warning">
          Back
        </button>
      </div>

      <!-- Delete Center -->
      <div class="col-10 text-center">
        <button (click)="deleteMany()" class="btn btn-danger">
          Delete
        </button>
      </div>

      <!-- Next Right -->
      <div class="col text-right">
        <button (click)="next()" [disabled]="form.nextListSize == 0" class="btn btn-info">
          Next
        </button>
      </div>

    </div>
  </div>

  <!-- Back Button (Only when list empty) -->
  <div class="col text-center">
    <button *ngIf="form.list.length == 0" (click)="reset()" class="btn btn-warning">
      Back
    </button>
  </div>
</div>
