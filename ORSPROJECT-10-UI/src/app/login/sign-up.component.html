<!-- signup.component.html -->
<style>
.login-bg {
  background-image: url('/assets/files/register.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  width: 100%;
}
  .login-card {
    width: 550px;
    border-radius: 10px;
    background: linear-gradient(to bottom right, white);
    box-shadow: 9px 8px 7px #001a33;
  }

  .input-group-text {
    background: #ebebe0;
  }

  .grad {
    background-image: linear-gradient(to bottom right, rgb(32, 168, 168),
        rgb(219, 231, 237));
    background-repeat: no repeat;
    background-size: 100%;
    padding-bottom: 25px;
  }
</style>



<br>
<br>
<br>
<br>
<br>

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center login-bg">
  <div class="card shadow-lg p-4 login-card grad">

    <h3 class="text-center text-dark mb-3"><b>{{'Links.UserRegistration'|translate}}</b></h3>

    <div *ngIf="form.message && !form.error" class="alert alert-success alert-dismissible fade show">
      <button type="button" class="close" (click)="form.message=null">&times;</button>
      {{form.message}}
    </div>

    <div *ngIf="form.message && form.error" class="alert alert-danger alert-dismissible fade show">
      <button type="button" class="close" (click)="form.message=null">&times;</button>
      {{form.message}}
    </div>


    <!-- First Name -->
    <label class="fw-bold">{{'FirstName'|translate}} <span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text"><i class="fa fa-user"></i></span>
      <input type="text" class="form-control" name="firstName" [(ngModel)]="form.data.firstName"
        placeholder="{{'UserForm.Placeholders.FirstName' | translate}}">
    </div>
    <span class="text-danger">{{form.inputerror.firstName}}</span>

    <!-- Last Name -->
    <label class="fw-bold mt-3">{{'LastName'|translate}}<span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text"><i class="fa fa-user"></i></span>
      <input type="text" class="form-control" name="lastName" [(ngModel)]="form.data.lastName"
        placeholder="{{'UserForm.Placeholders.LastName' | translate}}">
    </div>
    <span class="text-danger">{{form.inputerror.lastName}}</span>

    <!-- Login ID -->
    <label class="fw-bold mt-3">{{'LoginId'|translate}}<span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text"><i class="fa fa-envelope"></i></span>
      <input type="text" class="form-control" name="loginId" [(ngModel)]="form.data.loginId"
        placeholder="{{'UserForm.Placeholders.LoginId' | translate}}">
    </div>
    <span class="text-danger">{{form.inputerror.loginId}}</span>

    <!-- Password -->
    <label class="fw-bold mt-3">{{'Password'|translate}} <span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text"><i class="fa fa-lock"></i></span>
      <input type="password" class="form-control" name="password" [(ngModel)]="form.data.password"
        placeholder="{{'UserForm.Placeholders.Password' | translate}}">
    </div>
    <span class="text-danger">{{form.inputerror.password}}</span>

    <!-- Date of Birth -->
    <label class="fw-bold mt-3">{{'DateOfBirth'|translate}} <span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text"><i class="fa fa-venus-mars"></i></span>
      <input type="date" class="form-control" name="dob" [(ngModel)]="form.data.dob">
    </div>
    <span class="text-danger">{{form.inputerror.dob}}</span>

    <!-- Gender -->
    <label class="fw-bold mt-3">{{'Gender'|translate}} <span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text"><i class="fa fa-venus-mars"></i></span>
      <select name="gender" [(ngModel)]="form.data.gender" class="form-control">
        <option value="undefined">{{'UserForm.SelectOptions.Select' | translate}}</option>
        <option value="Male">{{'UserForm.SelectOptions.Male' | translate}}</option>
        <option value="Female">{{'UserForm.SelectOptions.Female' | translate}}</option>
      </select>
    </div>
    <span class="text-danger">{{form.inputerror.gender}}</span>

    <!-- Mobile -->
    <label class="fw-bold mt-3">{{'Mobile'|translate}} <span class="text-danger">*</span></label>
    <div class="input-group mb-1">
      <span class="input-group-text"><i class="fa fa-phone"></i></span>
      <input type="text" class="form-control" name="phone" [(ngModel)]="form.data.phone" maxlength="10"
        placeholder="{{'UserForm.Placeholders.Mobile' | translate}}">
    </div>
    <span class="text-danger">{{form.inputerror.phone}}</span>

    <!-- Buttons -->
    <div class="text-center mt-4">
      <button class="btn btn-success me-3 px-4" (click)="signUp()">{{'Buttons.SignUp' |
        translate}}</button>&nbsp;&nbsp;&nbsp;&nbsp;
      <button class="btn btn-primary px-4" (click)="reset()">{{'Buttons.Reset' | translate}}</button>
    </div>

  </div>
</div>
