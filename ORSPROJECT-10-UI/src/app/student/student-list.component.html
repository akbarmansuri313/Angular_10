<br><br><br>
<div class="content-wrapper" style="padding-top: 3%; padding-bottom: 15%; 
background: url(assets/files/gettyimages-1132439283-640x640.jpg) no-repeat center center;
background-attachment: fixed;
background-size: cover;width:auto;
height: 90vh;">
  <div class="container-fluid">

    <!-- Alert Messages -->
    <div *ngIf="form.message && form.error === true" class="alert alert-danger alert-dismissible text-center mx-auto"
      style="max-width: 600px; width: 80%; margin-bottom: 15px;">
      <button type="button" class="close" data-dismiss="alert">&times;</button>
      {{form.message}}
    </div>

    <div *ngIf="form.message && form.error === false" class="alert alert-success alert-dismissible text-center mx-auto"
      style="max-width: 600px; width: 80%; margin-bottom: 15px;">
      <button type="button" class="close" data-dismiss="alert">&times;</button>
      {{form.message}}
    </div>

    <div class="panel panel-primary" *ngIf="form.list.length > 0">

      <div class="panel panel-primary">
        <div class="panel-heading" style="height: 70px;">
          <div class="text-center">
            <h2 class="text-primary font-weight-bold">Student List</h2>
          </div>
        </div>

        <div class="row p-1">
          <div class="col-sm-2">
            <input type="text" class="form-control" [(ngModel)]="form.searchParams.enrolNo"
              placeholder="Search Enrollment">
          </div>
          <div class="col-sm-2">
            <select class="form-control" [(ngModel)]="form.searchParams.id">

              <option [ngValue]="undefined">Select Name</option>

              <option *ngFor="let obj of form.preload.collegeList" [value]="obj.key">
                {{obj.value}}
              </option>

            </select>
          </div>

          <div class="col-sm-2">
            <input type="text" class="form-control" [(ngModel)]="form.searchParams.email" placeholder="Search Email">
          </div>

          <div class="col-sm-4 d-flex justify-content-end flex-wrap gap-2">
            <button (click)="search()" class="btn btn-primary">Search</button>&nbsp;&nbsp;&nbsp;
            <button (click)="reset()" class="btn btn-secondary">Reset</button>&nbsp;&nbsp;&nbsp;
            <button (click)="forward('/student')" class="btn btn-success">Add Student</button>
          </div>
        </div>





        <div class="p-1">
          <div class="table-responsive" *ngIf="form.list.length > 0">
            <table class="table table-bordered table-striped table-hover">
              <thead class="thead-light text-uppercase">
                <tr align="center">
                  <th><input type="checkbox" [(ngModel)]="isMasterSel" name="list_name" value="h1"
                      (change)="checkUncheckAll($event)" /></th>
                  <th>S.No</th>
                  <th>Enrollment No</th>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>College</th>
                  <th>DOB</th>
                  <th>Mobile</th>
                  <th>Email</th>
                  <th>Edit</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let m of form.list; let i = index" align="center">
                  <td><input type="checkbox" #checkboxes (change)="checklistUpdate()" name="list_name" id="{{m.id}}"
                      value="{{isMasterSel}}" /></td>
                  <td>{{(form.pageNo*5)+i+1}}</td>
                  <td>{{m.enrolNo}}</td>
                  <td>{{m.firstName}}</td>
                  <td>{{m.lastName}}</td>
                  <td>{{m.collegeName}}</td>
                  <td>{{ m.dob | date:'dd-MM-yyyy'}}</td>
                  <td>{{m.phoneNo}}</td>
                  <td>{{m.email}}</td>
                  <td>
                    <a (click)="forward('/student/' + m.id)" style="cursor: pointer;">
                      <i class="fa fa-edit text-info"></i>
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>

            <div class="row mt-3 align-items-center" *ngIf="form.list.length > 0">
              <div class="col text-left">
                <button (click)="previous()" [disabled]="form.pageNo==0" class="btn btn-info">Previous</button>
              </div>
              <div class="col text-center">
                <button (click)="deleteMany()" class="btn btn-danger">Delete</button>
              </div>
              <div class="col text-right">
                <button (click)="next()" [disabled]="form.nextListSize==0" class="btn btn-info">Next</button>
              </div>

           
            </div>
          </div>

                <!-- Back Button (Only when list empty) -->
            <div class="col text-center">
              <button *ngIf="form.list.length == 0" (click)="reset()" class="btn btn-warning">
                Back
              </button>
            </div>
          <br><br><br>
