<br> <br>
<div class="content-wrapper"
  style="padding-top: 7%; background: url(assets/files/wall.jpg) no-repeat center center; background-size: cover; width:auto; min-height:100vh;">
  <div class="container-fluid">


    <!-- Alert Messages -->
    <div *ngIf="form.message && form.error === true" class="alert alert-danger alert-dismissible text-center mx-auto"
      style="max-width: 600px; width: 80%; margin-bottom: 15px;">
      <button type="button" class="close" data-dismiss="alert">&times;</button>
      {{form.message}}
    </div>

    <div *ngIf="form.message && form.error === false" class="alert alert-success alert-dismissible text-center mx-auto"
      style="max-width: 600px; width: 80%; margin-bottom: 15px;">
      <button type="button" class="close" data-dismiss="alert">&times;</button>
      {{form.message}}
    </div>

    <div class="panel panel-primary" *ngIf="form.list.length > 0">

      <!-- Panel Heading -->
      <div class="panel-heading text-center" style="height:50px;">
        <h1 class="text-primary font-weight-bold">TimeTable List</h1>
      </div>

      <!-- Search + Buttons Row -->
      <div class="row align-items-center mb-3">
        <div class="col-sm-3 mb-2 mb-sm-0">
          <input type="text" class="form-control" [(ngModel)]="form.searchParams.subjectName"
            placeholder="Search Subject">
        </div>

        <div class="col-sm-3 mb-2 mb-sm-0">
          <input type="text" class="form-control" [(ngModel)]="form.searchParams.courseName"
            placeholder="Search Course">
        </div>

        <div class="col-sm-4 d-flex justify-content-end flex-wrap gap-2">
          <button (click)="search()" class="btn btn-primary">Search</button>&nbsp;&nbsp;&nbsp;
          <button (click)="reset()" class="btn btn-secondary">Reset</button>&nbsp;&nbsp;&nbsp;
          <button (click)="forward('/timetable')" class="btn btn-success">Add Timetable</button>
        </div>

      </div>


      <!-- TimeTable List Table -->
      <div class="table-responsive" *ngIf="form.list.length > 0">
        <table class="table table-bordered table-dark table-hover font-weight-bold">
          <thead class="thead-dark text-uppercase" align="center">
            <tr>
              <th><input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)" /></th>
              <th>S.No</th>
              <th>Semester</th>
              <th>Exam Date</th>
              <th>Exam Time</th>
              <th>Course</th>
              <th>Subject</th>
              <th>Description</th>
              <th>Edit</th>
            </tr>
          </thead>
          <tbody align="center">
            <tr *ngFor="let m of form.list; let i = index">
              <td><input type="checkbox" #checkboxes (change)="checklistUpdate()" [id]="m.id" [value]="isMasterSel" />
              </td>
              <td>{{(form.pageNo*5)+i+1}}</td>
              <td>{{ m.semester }}</td>
              <td>{{ m.examDate | date:'dd-MM-yyyy' }}</td>
              <td>{{ m.examTime }}</td>
              <td>{{ m.courseName }}</td>
              <td>{{ m.subjectName }}</td>
              <td>{{ m.description }}</td>
              <td>
                <button class="fa fa-edit text-primary" (click)="forward('/timetable/' + m.id)"
                  style="cursor:pointer; border:none; background:none;"></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination + Delete Row -->
      <div class="row mt-2 align-items-center" *ngIf="form.list.length > 0">

        <div class="col text-left">
          <button (click)="previous()" [disabled]="form.pageNo == 0" class="btn btn-info">Previous</button>
        </div>

        <div class="col text-center">
          <button *ngIf="form.list.length == 0" (click)="forward('/timetableList')"
            class="btn btn-warning">Back</button>
        </div>

        <div class="col-10 text-center">
          <button (click)="deleteMany()" class="btn btn-danger">Delete</button>
        </div>

        <div class="col text-right">
          <button (click)="next()" [disabled]="form.nextListSize == 0" class="btn btn-info">Next</button>
        </div>

      </div>
    </div>


    <!-- Back Button (Only when list empty) -->
    <div class="col text-center">
      <button *ngIf="form.list.length == 0" (click)="reset()" class="btn btn-warning">
        Back
      </button>
    </div>


  </div>
  <br> <br>
</div>
