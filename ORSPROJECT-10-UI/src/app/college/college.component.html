<style>
  .grad {
    background-image: linear-gradient(to bottom right, rgb(32, 168, 168), rgb(219, 231, 237));
    background-repeat: no-repeat;
    background-size: 100%;
    padding-bottom: 25px;
  }
</style>

<div class="row" style="padding-top:3%; padding-bottom:3%;
background: url(assets/files/wall.jpg) no-repeat center center;
background-attachment: fixed;
background-size: cover;width:auto;height:auto;">



  <div class="col-sm-4"></div>

  <div class="col-sm-4">
    <div class="card">
      <div class="card-body shadow-lg grad">

        <form>

          <h2 *ngIf="!form.data.id" class="text-primary font-weight-bold text-center">
            Add College
          </h2>

          <h2 *ngIf="form.data.id>0" class="text-primary font-weight-bold text-center">
            Update College
          </h2>

         <!-- Alert Messages -->
      <div *ngIf="form.message && form.error === true" class="alert alert-danger alert-dismissible text-center mx-auto"
        style="max-width: 600px; width: 80%; margin-bottom: 15px;">
        <button type="button" class="close" data-dismiss="alert">&times;</button>
        {{form.message}}
      </div>

      <div *ngIf="form.message && form.error === false"
        class="alert alert-success alert-dismissible text-center mx-auto"
        style="max-width: 600px; width: 80%; margin-bottom: 15px;">
        <button type="button" class="close" data-dismiss="alert">&times;</button>
        {{form.message}}
      </div>

          <!-- Name -->
          <div style="padding-top:3%">
            <span><b>Name</b></span>

            <div class="col-sm-12">
              <div class="input-group">

                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <i class="fa fa-user grey-text"></i>
                  </div>
                </div>

                <input type="text" name="name" [(ngModel)]="form.data.name" class="form-control"
                  placeholder="Enter Name">

              </div>

              <span class="alertRedColor">{{form.inputerror.name}}</span>

            </div>
          </div>


          <!-- Address -->
          <div style="padding-top:3%">
            <span><b>Address</b></span>

            <div class="col-sm-12">
              <div class="input-group">

                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <i class="fa fa-map-marker grey-text"></i>
                  </div>
                </div>

                <input type="text" name="addr" [(ngModel)]="form.data.address" class="form-control"
                  placeholder="Enter Address">

              </div>

              <span class="alertRedColor">{{form.inputerror.address}}</span>

            </div>
          </div>


          <!-- City -->
          <div style="padding-top:3%">
            <span><b>City</b></span>

            <div class="col-sm-12">
              <div class="input-group">

                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <i class="fa fa-location-arrow grey-text"></i>
                  </div>
                </div>

                <input type="text" name="city" [(ngModel)]="form.data.city" class="form-control"
                  placeholder="Enter City">

              </div>

              <span class="alertRedColor">{{form.inputerror.city}}</span>

            </div>
          </div>


          <!-- State -->
          <div style="padding-top:3%">
            <span><b>State</b></span>

            <div class="col-sm-12">
              <div class="input-group">

                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <i class="fa fa-address-card grey-text"></i>
                  </div>
                </div>

                <input type="text" name="state" [(ngModel)]="form.data.state" class="form-control"
                  placeholder="Enter State">

              </div>

              <span class="alertRedColor">{{form.inputerror.state}}</span>

            </div>
          </div>


          <!-- Phone -->
          <div style="padding-top:3%">
            <span><b>Phone No.</b></span>

            <div class="col-sm-12">
              <div class="input-group">

                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <i class="fa fa-phone grey-text"></i>
                  </div>
                </div>

                <input type="text" name="phnNo" [(ngModel)]="form.data.phoneNo" class="form-control"
                  placeholder="Enter Phone No.">

              </div>

              <span class="alertRedColor">{{form.inputerror.phoneNo}}</span>

            </div>
          </div>


          <!-- Buttons -->
         <div class="row pt-2 pl-2 pb-3">

            <div class="col-md-3"></div>

            <button *ngIf="!form.data.id" (click)="submit()" class="btn btn-success mr-2">
              Save
            </button>
&nbsp;&nbsp;&nbsp;&nbsp;
            <button *ngIf="form.data.id>0" (click)="submit()" class="btn btn-success mr-2">
              Update
            </button>

            <a class="btn btn-warning" [routerLink]="['/collegeList']">
              List
            </a>

          </div>


        

        </form>

      </div>
    </div>
  </div>

</div>

<br><br><br><br>
