<div class="row" style="padding-top:8%; padding-bottom:5%;
  background:url(assets/files/wall.jpg) no-repeat center center;
  background-size: cover; width:100%;  min-height:100vh;">

    <div class="col-sm-4"></div>

    <div class="col-sm-4">
        <div class="card">
            <div class="card-body input-group-addon grad">

                <form name="testForm">

                    <h2 *ngIf="!form.data.id" class="text-primary font-weight-bold text-center">
                        Add Geo Fence
                    </h2>

                    <h2 *ngIf="form.data.id > 0" class="text-primary font-weight-bold text-center">
                        Geo Fence List
                    </h2>

                    <!-- Success Message -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success">
                        {{form.message}}
                    </div>

                    <!-- Error Message -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger">
                        {{form.message}}
                    </div>

                    <!-- Allow Code -->
                    <div class="form-group">
                        <span><b>Geo Fence Code</b></span>
                        <div class="col-sm-12">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">
                                        <i class="fa fa-code"></i>
                                    </div>
                                </div>
                                <input type="text" name="geoFenceCode" [(ngModel)]="form.data.geoFenceCode"
                                    class="form-control" placeholder="Enter Geo Fence Code">
                            </div>
                        </div>

                        <span style="color: red;">{{form.inputerror.geoFenceCode}}</span>
                    </div>

                    <!-- User Name -->
                    <div class="form-group">
                        <span><b>Location Name</b></span>
                        <div class="col-sm-12">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">
                                        <i class="fa fa-user"></i>
                                    </div>
                                </div>
                                <input type="text" name="locationName" [(ngModel)]="form.data.locationName" class="form-control"
                                    placeholder="Enter Location Name">
                            </div>
                        </div>
                        <span style="color: red;">{{form.inputerror.locationName}}</span>
                    </div>

                    <!-- Source -->
                    <div class="form-group">
                        <span><b>Radius</b></span>
                        <div class="col-sm-12">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">
                                        <i class="fa fa-database"></i>
                                    </div>
                                </div>
                                <input type="text" name="radius" [(ngModel)]="form.data.radius" class="form-control"
                                    placeholder="Enter Radius">
                            </div>
                        </div>

                        <span style="color: red;">{{form.inputerror.radius}}</span>
                    </div>

                    <!-- Status -->
                    <div class="form-group">
                        <span><b>Status</b></span>
                        <div class="col-sm-12">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">
                                        <i class="fa fa-toggle-on"></i>
                                    </div>
                                </div>
                                <select class="form-control" name="status" [(ngModel)]="form.data.status">
                                    <option value="undefined">Select Status</option>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <span style="color: red;">{{form.inputerror.status}}</span>
                    </div>

                    <div class="row pt-2 pl-2 pb-3">
                        <div class="col-md-3"></div>
                        <button *ngIf="!form.data.id" (click)="submit()" class="btn btn-success mr-2">
                            Save
                        </button>
                        <button *ngIf="form.data.id > 0" (click)="submit()" class="btn btn-success mr-2">
                            Update
                        </button>
                        <a class="btn btn-warning" [routerLink]="['/geoFenceList']">
                            List
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>

</div>
