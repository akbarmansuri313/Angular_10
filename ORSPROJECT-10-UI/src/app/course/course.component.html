<br><br><br>
<style>
  .grad {
    background-image: linear-gradient(to bottom right, rgb(32, 168, 168), rgb(219, 231, 237));
    background-repeat: no-repeat;
    background-size: 100%;
    padding-bottom: 25px;
  }
</style>

<div class="row" style="padding-top: 3%; padding-bottom:15%;
background: url(assets/files/wall.jpg) no-repeat center center;
background-attachment: fixed;
background-size: cover; width:auto; height:auto;">

  <div class="col-sm-4"></div>
  <div class="col-sm-4">
    <div class="card">
      <div class="card-body shadow-lg grad">
        <form>
          <h2 *ngIf="!form.data.id" class="text-primary font-weight-bold" style="text-align:center;">Add Course</h2>
          <h2 *ngIf="form.data.id>0" class="text-primary font-weight-bold" style="text-align:center;">Update Course</h2>

          <div *ngIf="form.error && form.message != null" class="alert alert-danger alert-dismissible">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{form.message}}
          </div>
          <div *ngIf="!form.error && form.message != null" class="alert alert-success alert-dismissible">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{form.message}}
          </div>

          <div style="padding-top:3%">
            <span class="pt-2"><b>Name</b><span class="required-field"></span></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-file grey-text"></i></div>
                </div>
                <input type="text" name="name" [(ngModel)]="form.data.name" class="form-control"
                  placeholder="Enter Course Name">
              </div>
            </div>
            <span style="color: red;">{{form.inputerror.description}}</span>
          </div>


          <div style="padding-top:3%">
            <span class="pt-2"><b>Duration</b><span class="required-field"></span></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-clock-o grey-text"></i></div>
                </div>

                <select class="form-control" name="duration" [(ngModel)]="form.data.duration" style="cursor:pointer;">
                  <option [ngValue]="" value="undefined">Please select</option>
                  <option [value]="1">1 Year</option>
                  <option [value]="2">2 Year</option>
                  <option [value]="3">3 Year</option>
                  <option [value]="4">4 Year</option>
                  <option [value]="5">5 Year</option>
                </select>
              </div>
            </div>
          </div>
          <span style="color: red;">{{form.inputerror.description}}</span>

          <div style="padding-top:3%">
            <span class="pt-2"><b>Description</b><span class="required-field"></span></span>
            <div class="col-sm-12">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text"><i class="fa fa-bars grey-text"></i></div>
                </div>
                <textarea class="form-control" placeholder="Enter Description" name="description"
                  [(ngModel)]="form.data.description"></textarea>
              </div>
            </div>
          </div>
          <span style="color: red;">{{form.inputerror.description}}</span>

          <div class="row pt-3 justify-content-center">
            <div class="col-auto">
              <button *ngIf="!form.data.id" (click)="submit()" class="btn btn-success mr-3">Save</button>
              <button *ngIf="form.data.id>0" (click)="submit()" class="btn btn-success mr-4">Update</button>
              <button (click)="forward('/courseList')" type="button" class="btn btn-warning">List</button>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
  <br><br>
</div>
